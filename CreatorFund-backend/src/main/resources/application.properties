spring.application.name=CreatorFund

# Server port — Render injects $PORT at runtime
server.port=${PORT:8080}

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:creatorfund;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (useful for debugging on Render)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate — create tables fresh on every startup (in-memory)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.open-in-view=false

# Don't run schema.sql — Hibernate auto-creates from entities
spring.sql.init.mode=never
